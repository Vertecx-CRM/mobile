# JVM/Gradle: tamaños razonables y code cache explícito
org.gradle.jvmargs=-Xms512m -Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8 -XX:ReservedCodeCacheSize=256m -XX:NonNMethodCodeHeapSize=64m -XX:ProfiledCodeHeapSize=128m -XX:NonProfiledCodeHeapSize=64m -XX:+UseParallelGC

# Menos paralelismo para bajar picos de memoria
org.gradle.workers.max=2

# Kotlin daemon más pequeño
kotlin.daemon.jvm.options=-Xmx1024m

# AndroidX
android.useAndroidX=true
android.enableJetifier=true
